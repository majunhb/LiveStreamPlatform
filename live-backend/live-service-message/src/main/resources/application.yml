server:
  port: 8084

spring:
  application:
    name: live-service-message
  
  # Redis配置
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 
      database: 0
      timeout: 3000ms
  
  # MongoDB配置
    mongodb:
      host: 127.0.0.1
      port: 27017
      database: live_message
      username: 
      password: 
  
  # Kafka配置
  kafka:
    bootstrap-servers: 127.0.0.1:9092
    consumer:
      group-id: message-consumer-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  
  # WebSocket配置
  websocket:
    max-text-message-size: 65535
    max-binary-message-size: 65535
  
  # Nacos配置
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
      config:
        server-addr: 127.0.0.1:8848
        namespace: ${NACOS_NAMESPACE:public}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yml

# 暴露端点
management:
  endpoints:
    web:
      exposure:
        include: health,info

# 日志配置
logging:
  level:
    com.livestream: DEBUG
