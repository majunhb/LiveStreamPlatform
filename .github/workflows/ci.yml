name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest
    continue-on-error: true  # 暂时允许失败，待 Lombok 配置修复
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Build with Maven
      run: |
        cd live-backend
        mvn clean compile -DskipTests
    
    - name: Run tests
      run: |
        cd live-backend
        mvn test
      continue-on-error: true
  
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: live-admin-web/package-lock.json
    
    - name: Install dependencies
      run: |
        cd live-admin-web
        npm ci
    
    - name: Build frontend
      run: |
        cd live-admin-web
        npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: live-admin-web/dist/
        retention-days: 7
  
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: [frontend-build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Check frontend code
      run: |
        cd live-admin-web
        npm ci
        npm run lint -- --max-warnings 0
      continue-on-error: true
