# ============================================================
# SRS (Simple Realtime Server) 流媒体服务器配置文件
# 版本: SRS 5.x
# 描述: 直播平台流媒体服务配置，支持 RTMP、HTTP-FLV、WebRTC
# ============================================================

# 全局配置
listen              1935;           # RTMP 推流/拉流端口
max_connections     1000;           # 最大连接数
daemon              off;            # 关闭后台运行（Docker 环境）
stats               on;
stats_netcast_index 10;

# 日志配置
srs_log_tank        file;           # 日志输出到文件
srs_log_file        ./objs/srs.log; # 日志文件路径
srs_log_level       info;           # 日志级别: verbose, trace, debug, info, warn, error

# HTTP API 服务（管理接口）
http_api {
    enabled         on;             # 启用 HTTP API
    listen          1985;           # HTTP API 端口
    crossdomain     on;             # 允许跨域
    
    # API 认证配置（生产环境建议启用）
    # auth {
    #     enabled     on;
    #     username   admin;
    #     password   your_password;
    # }
}

# HTTP Server 服务（HTTP-FLV 拉流）
http_server {
    enabled         on;             # 启用 HTTP Server
    listen          8080;           # HTTP 端口
    dir             ./objs/nginx/html;  # 静态文件目录
}

# ============================================================
# 虚拟主机配置
# ============================================================
vhost __defaultVhost__ {
    # --------- HLS 配置 ---------
    hls {
        enabled         on;                     # 启用 HLS
        hls_path        ./objs/nginx/html/hls;  # HLS 文件存储路径
        hls_fragment    2;                      # 每个 TS 片段时长（秒）
        hls_window      10;                     # HLS 播放列表窗口大小
        hls_m3u8_file   [app]/[stream].m3u8;    # m3u8 文件命名
        hls_ts_file     [app]/[stream]-[seq].ts;
        hls_ts_floor    on;                     # 使用 floor 时间戳
        hls_cleanup     on;                     # 自动清理过期片段
        hls_dispose     30;                     # 片段保留时间（秒）
        hls_acodec      libaac;                 # 音频编码
        hls_vcodec      libx264;                # 视频编码
    }
    
    # --------- HTTP-FLV 配置 ---------
    http_remux {
        enabled     on;                                     # 启用 HTTP-FLV
        mount       [vhost]/[app]/[stream].flv;             # FLV 拉流路径
        hstrs       on;                                    # 启用 HTTP 块传输
        fast_cache  on;                                    # 启用快速缓存
        
        # 派发模式配置
        dispatch    on;
    }
    
    # --------- WebRTC 配置 ---------
    rtc {
        enabled         on;                     # 启用 WebRTC
        rtmp_to_rtc     on;                     # RTMP 转 WebRTC
        rtc_to_rtmp     on;                     # WebRTC 转 RTMP
        
        # STUN 服务器配置
        stun_streams    on;
        stun_version    34;
        
        # 候选人收集超时
        candidate       [local_ip];             # 本地 IP（容器内自动获取）
    }
    
    # --------- DVR 录制配置 ---------
    dvr {
        enabled     on;                                     # 启用录制
        dvr_path    ./dvr/[app]/[stream]/[2006]/[01]/[02]/[15].[04].[05].[999].flv;
        dvr_flv     on;                                     # 录制为 FLV 格式
        dvr_wait_keyframe  on;                              # 等待关键帧开始录制
        
        # 录制应用（设置为 ALL 表示录制所有应用）
        dvr_apply    ALL;
    }
    
    # --------- 播放配置 ---------
    play {
        # 播放配置组
        mw_latency   100;        # 最小等待时间（毫秒）
        gop_cache    on;         # 开启 GOP 缓存（提升首帧速度）
        queue_length 10;         # 直播流缓冲队列长度
        
        # 播放认证（生产环境建议启用）
        # auth {
        #     enabled     on;
        #     sign_dir    ./objs/nginx/html/sign;
        # }
    }
    
    # --------- 推流配置 ---------
    publish {
        # 正常延迟模式
        mr              on;     # 开启合并写（降低CPU）
        mw_latency      100;    # 最小等待时间
        
        # 推流认证（生产环境建议启用）
        # auth {
        #     enabled     on;
        #     username   publisher;
        #     password   your_password;
        # }
    }
    
    # --------- 带宽控制 ---------
    bandcheck {
        enabled     off;
        # 带宽检测配置
        # key         your_secret_key;
        # limit       5000;      # kbps
        # require_cpu off;
    }
    
    # --------- TCP 配置 ---------
    tcp_nodelay     on;         # TCP_NODELAY（降低延迟）
    minimal_latency on;         # 最小化延迟模式
    
    # --------- 踢出配置 ---------
    # 踢出播放超时客户端
    # play_timeouts {
    #     enabled     on;
    #     timeout     60;        # 超时时间（秒）
    # }
    
    # 踢出推流超时客户端
    # publish_timeouts {
    #     enabled     on;
    #     timeout     30;
    # }
    
    # --------- 心跳配置 ---------
    heartbeat {
        enabled     on;
        interval    9;          # 心跳间隔（秒）
        url         http://127.0.0.1:1985/api/versions;
        device_id_file ./objs/srs_heartbeat.json;
    }
}

# ============================================================
# 开发测试用的虚拟主机（低延迟模式）
# ============================================================
vhost dev.__defaultVhost__ {
    # 开发环境使用更低的延迟
    play {
        mw_latency   50;
        gop_cache    off;       # 开发环境关闭 GOP 缓存
    }
    publish {
        mr          off;       # 开发环境关闭合并写
    }
}

# ============================================================
# 录制专用虚拟主机
# ============================================================
vhost dvr.__defaultVhost__ {
    dvr {
        enabled     on;
        dvr_path    ./dvr/[app]/[stream]/[2006]-[01]-[02]-[15].[04].[05].[999].flv;
        dvr_flv     on;
        dvr_wait_keyframe  on;
        dvr_duration  1800;    # 单个录制文件最大时长（秒）
    }
}

# ============================================================
# 配置文件结束
# ============================================================
